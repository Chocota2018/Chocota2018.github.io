<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カメラ監視 — クライアント</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap');

  :root {
    --bg: #050a0e;
    --surface: #0b1520;
    --panel: #0d1f2d;
    --accent: #00e5ff;
    --accent2: #ff4060;
    --text: #c8e6f0;
    --muted: #4a7a8a;
    --border: #1a3a4a;
    --green: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    gap: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 6px; left: 6px;
    width: 14px; height: 14px;
    border-top: 2px solid var(--accent);
    border-left: 2px solid var(--accent);
    z-index: 5;
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: 6px; right: 6px;
    width: 14px; height: 14px;
    border-bottom: 2px solid var(--accent);
    border-right: 2px solid var(--accent);
    z-index: 5;
  }

  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(0,229,255,0.4);
  }

  .logo span { color: var(--muted); font-size: 11px; }

  .cam-id-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    padding: 3px 10px;
    border: 1px solid var(--border);
    background: var(--panel);
  }

  /* Setup form */
  #setup {
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field label {
    display: block;
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .field input, .field select {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(0,229,255,0.15);
  }

  .field select option { background: var(--panel); }

  .connect-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    width: 100%;
    margin-top: 4px;
  }

  .connect-btn:hover {
    background: rgba(0,229,255,0.08);
    box-shadow: 0 0 20px rgba(0,229,255,0.2);
  }

  .connect-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Video feed area */
  #feed-area {
    display: none;
    flex-direction: column;
  }

  .video-wrap {
    position: relative;
    aspect-ratio: 16/9;
    background: #000;
    overflow: hidden;
  }

  #localVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transform: scaleX(-1); /* mirror for preview */
  }

  .rec-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 5;
  }

  .rec-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    animation: blink 1s ease-in-out infinite;
    box-shadow: 0 0 6px var(--accent2);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .feed-status {
    position: absolute;
    bottom: 10px;
    right: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    z-index: 5;
  }

  .feed-info {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-top: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .info-item { display: flex; gap: 6px; }
  .info-val { color: var(--accent); }

  .stop-btn {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 6px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
  }

  .stop-btn:hover {
    background: rgba(255,64,96,0.1);
    box-shadow: 0 0 12px rgba(255,64,96,0.2);
  }

  /* Status message */
  #statusMsg {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 1.5px;
    padding: 10px 16px;
    border-left: 3px solid var(--accent);
    background: rgba(0,229,255,0.05);
    color: var(--muted);
    display: none;
  }

  #statusMsg.error {
    border-color: var(--accent2);
    background: rgba(255,64,96,0.05);
    color: var(--accent2);
  }

  .footer-note {
    max-width: 560px;
    width: 100%;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.8;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">CAMVIEW<span> // CLIENT</span></div>
    <div class="cam-id-badge" id="camIdBadge">ID: --</div>
  </div>

  <div id="statusMsg"></div>

  <!-- Setup -->
  <div id="setup">
    <div class="field">
      <label>デバイス名（任意）</label>
      <input type="text" id="nameInput" placeholder="例: エントランス・事務所A" maxlength="32">
    </div>
    <div class="field">
      <label>カメラ選択</label>
      <select id="cameraSelect">
        <option value="">読み込み中...</option>
      </select>
    </div>
    <button class="connect-btn" id="connectBtn" onclick="startStreaming()">
      ⬛ CONNECT & STREAM
    </button>
  </div>

  <!-- Live feed -->
  <div id="feed-area">
    <div class="video-wrap">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="rec-badge"><div class="rec-dot"></div>STREAMING</div>
      <div class="feed-status" id="feedStatus" style="color:var(--muted)">CONNECTING...</div>
    </div>
    <div class="feed-info">
      <div class="info-item">ID: <span class="info-val" id="myId">--</span></div>
      <div class="info-item">NAME: <span class="info-val" id="myName">--</span></div>
      <div class="info-item">TIME: <span class="info-val" id="myTime">--:--:--</span></div>
      <button class="stop-btn" onclick="stopStreaming()">■ STOP</button>
    </div>
  </div>
</div>

<div class="footer-note">
  カメラ映像はブラウザ間でP2P（WebRTC）で送信されます。<br>
  サーバーには映像データは保存されません。
</div>

<script>
  let ws = null;
  let localStream = null;
  let peerConnection = null;
  let myClientId = null;
  let myName = null;
  let reconnectTimer = null;

  // Clock
  setInterval(() => {
    document.getElementById('myTime').textContent = new Date().toTimeString().slice(0,8);
  }, 1000);

  // Enumerate cameras
  async function loadCameras() {
    try {
      // Request permission first to get labels
      const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
      tempStream.getTracks().forEach(t => t.stop());

      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter(d => d.kind === 'videoinput');
      const select = document.getElementById('cameraSelect');
      select.innerHTML = '';
      cameras.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.textContent = cam.label || `カメラ ${i + 1}`;
        select.appendChild(opt);
      });
    } catch(e) {
      document.getElementById('cameraSelect').innerHTML = '<option value="">カメラへのアクセスを許可してください</option>';
      showStatus('カメラへのアクセスが必要です。ブラウザの許可を確認してください。', 'error');
    }
  }

  function showStatus(msg, type = 'info') {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = type === 'error' ? 'error' : '';
    el.style.display = 'block';
  }

  function hideStatus() {
    document.getElementById('statusMsg').style.display = 'none';
  }

  async function startStreaming() {
    const nameInput = document.getElementById('nameInput').value.trim();
    const deviceId = document.getElementById('cameraSelect').value;
    myName = nameInput || `Client-${Date.now().toString(36).slice(-4).toUpperCase()}`;

    document.getElementById('connectBtn').disabled = true;
    showStatus('カメラ起動中...');

    try {
      const constraints = {
        video: deviceId ? { deviceId: { exact: deviceId }, width: 1280, height: 720 } : { width: 1280, height: 720 },
        audio: false
      };
      localStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(e) {
      showStatus('カメラの起動に失敗しました: ' + e.message, 'error');
      document.getElementById('connectBtn').disabled = false;
      return;
    }

    document.getElementById('localVideo').srcObject = localStream;
    document.getElementById('setup').style.display = 'none';
    document.getElementById('feed-area').style.display = 'flex';
    document.getElementById('myName').textContent = myName;

    connectWebSocket();
  }

  function connectWebSocket() {
    const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${wsProto}//${location.host}`);

    ws.addEventListener('open', () => {
      showStatus('サーバーに接続中...');
      ws.send(JSON.stringify({ type: 'register-client', name: myName }));
    });

    ws.addEventListener('message', async (ev) => {
      const msg = JSON.parse(ev.data);

      switch(msg.type) {
        case 'registered':
          myClientId = msg.id;
          myName = msg.name;
          document.getElementById('myId').textContent = `CAM-${String(msg.id).padStart(3,'0')}`;
          document.getElementById('camIdBadge').textContent = `ID: CAM-${String(msg.id).padStart(3,'0')}`;
          document.getElementById('myName').textContent = msg.name;
          hideStatus();
          document.getElementById('feedStatus').textContent = 'WAITING FOR HOST';
          document.getElementById('feedStatus').style.color = 'var(--muted)';
          break;

        case 'request-stream':
          await createOffer();
          break;

        case 'answer':
          if (peerConnection) {
            await peerConnection.setRemoteDescription({ type: 'answer', sdp: msg.sdp });
          }
          break;

        case 'ice-candidate':
          if (peerConnection && msg.candidate) {
            try { await peerConnection.addIceCandidate(msg.candidate); } catch(e) {}
          }
          break;
      }
    });

    ws.addEventListener('close', () => {
      document.getElementById('feedStatus').textContent = 'RECONNECTING...';
      document.getElementById('feedStatus').style.color = 'var(--accent2)';
      // Auto reconnect after 3s
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connectWebSocket, 3000);
    });

    ws.addEventListener('error', () => {
      document.getElementById('feedStatus').textContent = 'CONNECTION ERROR';
      document.getElementById('feedStatus').style.color = 'var(--accent2)';
    });
  }

  async function createOffer() {
    // Close existing
    if (peerConnection) peerConnection.close();

    peerConnection = new RTCPeerConnection({
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });

    // Add tracks
    localStream.getTracks().forEach(track => {
      peerConnection.addTrack(track, localStream);
    });

    peerConnection.addEventListener('icecandidate', (ev) => {
      if (ev.candidate) {
        ws.send(JSON.stringify({ type: 'ice-candidate', candidate: ev.candidate }));
      }
    });

    peerConnection.addEventListener('connectionstatechange', () => {
      const statusEl = document.getElementById('feedStatus');
      if (peerConnection.connectionState === 'connected') {
        statusEl.textContent = 'LIVE ✓';
        statusEl.style.color = 'var(--green)';
      } else if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
        statusEl.textContent = 'HOST DISCONNECTED';
        statusEl.style.color = 'var(--accent2)';
      }
    });

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    ws.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
  }

  function stopStreaming() {
    clearTimeout(reconnectTimer);
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (peerConnection) peerConnection.close();
    if (ws) ws.close();
    localStream = null;
    peerConnection = null;
    ws = null;
    myClientId = null;

    document.getElementById('feed-area').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('camIdBadge').textContent = 'ID: --';
    hideStatus();
  }

  // Init
  loadCameras();
</script>
</body>
</html>
