<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serial Number Checker</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'serial-checker';

        // UI Elements
        const video = document.createElement("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
        const loadingMessage = document.getElementById("loadingMessage");
        const outputMessage = document.getElementById("outputMessage");
        const outputData = document.getElementById("outputData");
        const statusBadge = document.getElementById("statusBadge");
        const restartBtn = document.getElementById("restartBtn");
        const scanLine = document.getElementById("scanLine");

        let isScanning = true;
        let user = null;

        // Initialize Auth
        async function initAuth() {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Auth error:", error);
            }
        }
        initAuth();
        onAuthStateChanged(auth, (u) => { user = u; });

        function drawLine(begin, end, color) {
            canvas.beginPath();
            canvas.moveTo(begin.x, begin.y);
            canvas.lineTo(end.x, end.y);
            canvas.lineWidth = 4;
            canvas.strokeStyle = color;
            canvas.stroke();
        }

        // Camera Setup
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(function(stream) {
            video.srcObject = stream;
            video.setAttribute("playsinline", true);
            video.play();
            requestAnimationFrame(tick);
        }).catch(err => {
            loadingMessage.innerText = "カメラを起動できませんでした。";
        });

        // Check serial in database
        async function checkSerialNumber(serial) {
            if (!user) return;
            
            // Path: /artifacts/{appId}/public/data/serials/{serial}
            const serialDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'serials', serial);
            
            try {
                const docSnap = await getDoc(serialDocRef);

                if (docSnap.exists()) {
                    // Already exists
                    showResult(serial, "USED");
                } else {
                    // New serial, save it
                    await setDoc(serialDocRef, {
                        serial: serial,
                        usedAt: serverTimestamp(),
                        userId: user.uid
                    });
                    showResult(serial, "NEW");
                }
            } catch (error) {
                console.error("Database error:", error);
                showResult(serial, "ERROR");
            }
        }

        function showResult(serial, status) {
            isScanning = false;
            scanLine.classList.add('hidden');
            outputMessage.hidden = true;
            outputData.innerText = serial;
            outputData.classList.remove('hidden');
            statusBadge.classList.remove('hidden');

            if (status === "USED") {
                statusBadge.innerText = "⚠️ 使用済み";
                statusBadge.className = "px-3 py-1 rounded-full text-sm font-bold bg-red-100 text-red-600";
            } else if (status === "NEW") {
                statusBadge.innerText = "✅ 登録完了 (新規)";
                statusBadge.className = "px-3 py-1 rounded-full text-sm font-bold bg-green-100 text-green-600";
            } else {
                statusBadge.innerText = "❌ エラーが発生しました";
                statusBadge.className = "px-3 py-1 rounded-full text-sm font-bold bg-gray-100 text-gray-600";
            }

            if (window.navigator.vibrate) window.navigator.vibrate(200);
        }

        function tick() {
            if (!isScanning) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                loadingMessage.hidden = true;
                canvasElement.hidden = false;
                scanLine.classList.remove('hidden');

                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) {
                    drawLine(code.location.topLeftCorner, code.location.topRightCorner, "#22c55e");
                    drawLine(code.location.topRightCorner, code.location.bottomRightCorner, "#22c55e");
                    drawLine(code.location.bottomRightCorner, code.location.bottomLeftCorner, "#22c55e");
                    drawLine(code.location.bottomLeftCorner, code.location.topLeftCorner, "#22c55e");
                    
                    // シリアルナンバーのチェック開始
                    checkSerialNumber(code.data);
                }
            }
            requestAnimationFrame(tick);
        }

        restartBtn.addEventListener('click', () => {
            isScanning = true;
            outputData.classList.add('hidden');
            statusBadge.classList.add('hidden');
            outputMessage.hidden = false;
            requestAnimationFrame(tick);
        });
    </script>
    <style>
        #canvas { width: 100%; border-radius: 12px; }
        .scanning-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 3px;
            background: #22c55e; animation: scan 2s linear infinite;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 font-sans text-slate-800">

    <div class="max-w-md w-full space-y-6">
        <header class="text-center">
            <h1 class="text-2xl font-bold text-slate-900">シリアルチェッカー</h1>
            <p class="text-slate-500 text-sm">重複登録を防止します</p>
        </header>

        <div class="relative overflow-hidden bg-black rounded-2xl aspect-square flex items-center justify-center">
            <canvas id="canvas" hidden></canvas>
            <div id="loadingMessage" class="text-white text-center p-4">カメラを起動中...</div>
            <div id="scanLine" class="scanning-line hidden"></div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-4">
            <div class="flex items-center justify-between">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Result</span>
                <div id="statusBadge" class="hidden"></div>
            </div>
            <div id="outputContainer" class="min-h-[40px] flex items-center justify-center border-t border-slate-50 pt-4">
                <p id="outputMessage" class="text-slate-400 italic">QRコードをスキャンしてください</p>
                <p id="outputData" class="hidden text-xl font-mono font-bold text-slate-900 bg-slate-100 px-3 py-1 rounded"></p>
            </div>
        </div>

        <button id="restartBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">
            次のスキャン
        </button>
    </div>

</body>
</html>
